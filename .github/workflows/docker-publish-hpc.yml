name: Publish HPC Docker Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional tag (example: 4.1.1). If empty, uses manual-<sha>."
        required: false
        type: string
      push_latest:
        description: "Also publish :latest"
        required: false
        default: true
        type: boolean

concurrency:
  group: docker-publish-hpc-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/biofilter-hpc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail

          IMAGE_NAME_LC="${IMAGE_NAME,,}"

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            VERSION_TAG="${GITHUB_REF_NAME#v}"
            TAGS="${IMAGE_NAME_LC}:${VERSION_TAG},${IMAGE_NAME_LC}:latest"
          else
            INPUT_TAG="${{ github.event.inputs.image_tag }}"
            PUSH_LATEST="${{ github.event.inputs.push_latest }}"
            SHA_TAG="manual-${GITHUB_SHA::7}"
            VERSION_TAG="${INPUT_TAG:-$SHA_TAG}"
            TAGS="${IMAGE_NAME_LC}:${VERSION_TAG}"
            if [[ "${PUSH_LATEST}" == "true" ]]; then
              TAGS="${TAGS},${IMAGE_NAME_LC}:latest"
            fi
          fi

          echo "tags=${TAGS}" >> "${GITHUB_OUTPUT}"
          echo "Using tags: ${TAGS}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/hpc/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=hpc
          cache-to: type=gha,mode=max,scope=hpc
